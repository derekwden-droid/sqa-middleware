version: '3.9'

services:

  sqa-benchmark:
    build: .
    # Pin to first 12 physical cores on Ryzen (adjust to your core count)
    # Check yours with: lscpu | grep "Core(s) per socket"
    cpuset: "0-11"
    cpu_count: 12
    mem_limit: "8g"
    environment:
      - AGENT_TYPE=sqa
      - N_CORES=12
      - OMP_NUM_THREADS=12
      - MKL_NUM_THREADS=12
      - NUMBA_NUM_THREADS=12
    volumes:
      - "./results:/results"
    command: >
      python -m benchmarks.ab_test_runner
      --trials 500
      --spins 64
      --sweeps 300
      --output /results/benchmark_results.json
